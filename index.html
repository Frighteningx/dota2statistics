<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Tactical Analyzer - Elite Edition</title>
    <style>
        :root {
            --dota-red: #B44335;
            --dota-red-bright: #E44D3A;
            --dota-dark: #1C1D20;
            --dota-panel: #2B2D33;
            --dota-gold: #C0A05F;
            --dota-text: #D4D4D4;
            --dota-border: #42464F;
            --win-green: #73D35B;
            --win-green-dark: #2d5a27;
            --combo-blue: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dota-dark);
            background-image: radial-gradient(circle at 50% 0%, #302626 0%, transparent 60%);
            color: var(--dota-text);
            margin: 0;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(to bottom, #111, var(--dota-dark));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--dota-red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            padding: 25px;
            max-width: 1700px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--dota-panel);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid var(--dota-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--dota-gold); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        
        select {
            width: 100%; padding: 12px; background: #111; color: #fff;
            border: 1px solid var(--dota-border); border-radius: 3px;
        }

        .enemy-slot {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            background: rgba(0,0,0,0.4); padding: 5px; border-radius: 4px;
        }

        .slot-img { width: 60px; height: 34px; border: 1px solid #444; object-fit: cover; }

        .btn-analyze {
            width: 100%; padding: 18px;
            background: linear-gradient(to bottom, var(--win-green-dark), var(--win-green));
            color: #000; border: none; font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .btn-analyze:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .recommendation-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px;
        }

        .hero-card {
            background: #24262b; border-radius: 4px; border: 1px solid var(--dota-border);
            padding: 20px; position: relative; border-left: 5px solid var(--win-green);
        }

        /* Impact Visuals */
        .header-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .winrate-val { color: var(--win-green); font-size: 1.5rem; font-weight: bold; }
        .impact-bar { width: 100px; height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .impact-fill { height: 100%; background: var(--win-green); transition: width 1s; }

        /* Build & Combos */
        .section-title { font-size: 0.75rem; color: var(--dota-gold); text-transform: uppercase; border-bottom: 1px solid #444; margin: 15px 0 10px; padding-bottom: 3px; }
        .items-row { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .item-box {
            background: #111; border: 1px solid #333; padding: 5px; width: 65px; text-align: center; border-radius: 3px;
        }
        .item-box img { width: 50px; height: 37px; }
        .item-box span { font-size: 0.65rem; display: block; color: var(--win-green); font-weight: bold; }

        /* Combo Visualizer */
        .combo-sequence {
            display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3);
            padding: 12px; border-radius: 6px; border: 1px solid rgba(74, 144, 226, 0.3);
        }
        .key-cap {
            background: linear-gradient(to bottom, #444, #222);
            border: 1px solid #666; border-radius: 4px;
            padding: 4px 10px; font-weight: bold; color: #fff;
            box-shadow: 0 2px 0 #000; font-family: monospace; font-size: 1rem;
        }
        .arrow { color: var(--dota-gold); font-weight: bold; }
        .combo-desc { font-size: 0.8rem; color: var(--combo-blue); margin-top: 5px; font-style: italic; }

        .loader { text-align: center; color: var(--win-green); font-size: 1.5rem; display: none; padding: 50px; }
    </style>
</head>
<body>

<header>
    <h1>DOTA 2 <span>ELITE</span> STRAT</h1>
    <p style="color: var(--win-green); letter-spacing: 3px;">MAX DAMAGE PROTOCOL & COUNTER-MATRIX</p>
</header>

<div class="main-layout">
    <aside class="card">
        <div class="input-group">
            <label>Rol Estratégico</label>
            <select id="playerRole">
                <option value="1">Pos 1 - Hard Carry</option>
                <option value="2">Pos 2 - Midlaner</option>
                <option value="3">Pos 3 - Offlaner</option>
                <option value="4">Pos 4 - Soft Support</option>
                <option value="5">Pos 5 - Hard Support</option>
            </select>
        </div>

        <h3>Draft Enemigo (Análisis 5v5)</h3>
        <div id="enemySlots">
            <div class="enemy-slot"><img id="img-0" class="slot-img"><select class="hero-sel" id="sel-0" onchange="updateIcon(0)"></select></div>
            <div class="enemy-slot"><img id="img-1" class="slot-img"><select class="hero-sel" id="sel-1" onchange="updateIcon(1)"></select></div>
            <div class="enemy-slot"><img id="img-2" class="slot-img"><select class="hero-sel" id="sel-2" onchange="updateIcon(2)"></select></div>
            <div class="enemy-slot"><img id="img-3" class="slot-img"><select class="hero-sel" id="sel-3" onchange="updateIcon(3)"></select></div>
            <div class="enemy-slot"><img id="img-4" class="slot-img"><select class="hero-sel" id="sel-4" onchange="updateIcon(4)"></select></div>
        </div>
        <button class="btn-analyze" onclick="processDraft()">Ejecutar Análisis</button>
    </aside>

    <main class="card">
        <div id="loader" class="loader">Procesando Secuencias de Combate...</div>
        <div id="resultsArea" class="recommendation-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 50px; color: #666;">
                Esperando ingreso de Draft enemigo para calcular protocolos de ataque...
            </div>
        </div>
    </main>
</div>

<script>
    const API = "https://api.opendota.com/api";
    const HERO_IMG = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/";
    const ITEM_IMG = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/";
    let heroesData = [];

    // Diccionario de Combos por Héroe (Heurística de Daño Máximo)
    const comboMatrix = {
        "Axe": { keys: ["Blink", "R", "W"], desc: "Blink -> Berserker's Call -> Blade Mail -> Culling Blade" },
        "Phantom Assassin": { keys: ["W", "Q", "Items"], desc: "Phantom Strike -> Fan of Knives -> Abyssals -> Coup de Grace" },
        "Legion Commander": { keys: ["Blink", "W", "R"], desc: "Press the Attack -> Blink -> Duel -> Blademail" },
        "Juggernaut": { keys: ["R", "Q"], desc: "Omnislash -> Swift Slash -> Blade Fury (para escape o DPS)" },
        "Faceless Void": { keys: ["Q", "R", "W"], desc: "Time Walk -> Chronosphere -> Manta/MoM -> Time Dilation" },
        "Anti-Mage": { keys: ["R"], desc: "Blink -> Abyssals -> Manta -> Mana Void (al final)" },
        "Tidehunter": { keys: ["R", "Q", "E"], desc: "Blink -> Ravage -> Gush -> Anchor Smash" },
        "Slark": { keys: ["Q", "W", "Items"], desc: "Dark Pact -> Pounce -> Shadow Dance -> Diffusal" },
        "default": { keys: ["Q", "W", "E", "R"], desc: "Secuencia estándar de Burst: Iniciación -> CC -> Nukes -> Ultimate" }
    };

    async function init() {
        const r = await fetch(`${API}/heroes`);
        heroesData = await r.json();
        heroesData.sort((a,b) => a.localized_name.localeCompare(b.localized_name));
        document.querySelectorAll('.hero-sel').forEach(s => {
            s.innerHTML = `<option value="">Vacio</option>` + heroesData.map(h => `<option value="${h.id}">${h.localized_name}</option>`).join('');
        });
    }

    function updateIcon(i) {
        const id = document.getElementById(`sel-${i}`).value;
        const h = heroesData.find(x => x.id == id);
        document.getElementById(`img-${i}`).src = h ? `${HERO_IMG}${h.name.replace('npc_dota_hero_', '')}.png` : "";
    }

    function calculateBuild(enemyIds, role) {
        // Lógica simplificada de items (mantenida del paso anterior para coherencia)
        let build = { early: [], core: [], situ: [] };
        if(role <= 2) {
            build.early = [{n: 'Wand', k: 'magic_wand', t: '4m'}, {n: 'Treads', k: 'power_treads', t: '8m'}];
            build.core = [{n: 'BKB', k: 'black_king_bar', t: '22m'}, {n: 'Manta', k: 'manta', t: '18m'}];
            build.situ = [{n: 'Abyssal', k: 'abyssal_blade', t: '35m'}, {n: 'Butterfly', k: 'butterfly', t: '40m'}];
        } else {
            build.early = [{n: 'Boots', k: 'boots', t: '5m'}, {n: 'Bracer', k: 'bracer', t: '3m'}];
            build.core = [{n: 'Blink', k: 'blink', t: '15m'}, {n: 'Forcestaff', k: 'force_staff', t: '20m'}];
            build.situ = [{n: 'Scythe', k: 'sheepstick', t: '35m'}, {n: 'Lotus', k: 'lotus_orb', t: '30m'}];
        }
        return build;
    }

    async function processDraft() {
        const area = document.getElementById('resultsArea');
        const role = document.getElementById('playerRole').value;
        const enemies = Array.from(document.querySelectorAll('.hero-sel')).map(s => s.value).filter(v => v);

        if(!enemies.length) return alert("Selecciona enemigos.");
        document.getElementById('loader').style.display = "block";
        area.innerHTML = "";

        try {
            const promises = enemies.map(id => fetch(`${API}/heroes/${id}/matchups`).then(r => r.json()));
            const data = await Promise.all(promises);

            let scores = {};
            data.forEach(list => {
                list.forEach(m => {
                    if(!scores[m.hero_id]) scores[m.hero_id] = 0;
                    if(m.games_played > 15) scores[m.hero_id] += (m.wins/m.games_played);
                });
            });

            const top = Object.keys(scores)
                .filter(id => !enemies.includes(id))
                .map(id => ({ id: parseInt(id), score: scores[id]/enemies.length }))
                .sort((a,b) => b.score - a.score).slice(0, 4);

            top.forEach(rec => {
                const h = heroesData.find(x => x.id === rec.id);
                const build = calculateBuild(enemies, role);
                const combo = comboMatrix[h.localized_name] || comboMatrix["default"];
                const cleanName = h.name.replace('npc_dota_hero_', '');

                area.innerHTML += `
                    <div class="hero-card">
                        <div class="header-stats">
                            <div style="display:flex; gap:12px; align-items:center;">
                                <img src="${HERO_IMG}${cleanName}.png" style="width:90px; border:1px solid var(--dota-border)">
                                <div>
                                    <strong style="font-size:1.3rem">${h.localized_name}</strong>
                                    <div class="impact-bar"><div class="impact-fill" style="width:${(rec.score*100).toFixed(0)}%"></div></div>
                                </div>
                            </div>
                            <div class="winrate-val">${(rec.score*100).toFixed(1)}% <small style="font-size:0.7rem; color:#888">WR</small></div>
                        </div>

                        <div class="section-title">Combo de Ataque (Burst Protocol)</div>
                        <div class="combo-sequence">
                            ${combo.keys.map(k => `<span class="key-cap">${k}</span>`).join('<span class="arrow">→</span>')}
                        </div>
                        <div class="combo-desc">${combo.desc}</div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
                            <div>
                                <div class="section-title">Core Build</div>
                                <div class="items-row">
                                    ${build.core.map(i => `<div class="item-box"><img src="${ITEM_IMG}${i.k}.png"><span>${i.t}</span></div>`).join('')}
                                </div>
                            </div>
                            <div>
                                <div class="section-title">Counters Situacionales</div>
                                <div class="items-row">
                                    ${build.situ.map(i => `<div class="item-box"><img src="${ITEM_IMG}${i.k}.png"><span>${i.t}</span></div>`).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch(e) { console.error(e); }
        document.getElementById('loader').style.display = "none";
    }

    init();
</script>
</body>
</html>
