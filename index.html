<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Pro Draft Analyzer v3.0</title>
    <style>
        :root {
            /* Paleta Dota 2 + Tonos "Green Strat" para métricas positivas */
            --dota-red: #B44335;
            --dota-red-bright: #E44D3A;
            --dota-dark: #1C1D20;
            --dota-panel: #2B2D33;
            --dota-gold: #C0A05F;
            --dota-text: #D4D4D4;
            --dota-border: #42464F;
            --win-green: #73D35B;
            --win-green-dark: #2d5a27;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dota-dark);
            background-image: radial-gradient(circle at 50% 0%, #302626 0%, transparent 60%);
            color: var(--dota-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(to bottom, #111, var(--dota-dark));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--dota-red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        h1 { margin: 0; color: #fff; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        h1 span { color: var(--dota-red-bright); }
        h3 { color: var(--dota-gold); margin-top: 0; text-transform: uppercase; font-size: 1rem; border-bottom: 1px solid var(--dota-border); padding-bottom: 8px; }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--dota-panel);
            border-radius: 4px;
            padding: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid var(--dota-border);
        }

        /* Selectores */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--dota-gold); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 8px; }
        
        select {
            width: 100%;
            padding: 10px;
            background: #1A1A1A;
            color: var(--dota-text);
            border: 1px solid var(--dota-border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--dota-gold); }

        .enemy-slot {
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; border-left: 3px solid var(--dota-red);
        }

        .slot-img { width: 70px; height: 39px; background: #000; object-fit: cover; border: 1px solid var(--dota-border); }

        .btn-analyze {
            width: 100%; padding: 15px;
            background: linear-gradient(to bottom, var(--win-green-dark), var(--win-green));
            color: #000; border: none; border-radius: 3px;
            font-weight: 900; font-size: 1.1rem; text-transform: uppercase;
            cursor: pointer; margin-top: 15px; transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-analyze:hover { filter: brightness(1.2); }

        /* Resultados Visuales */
        .recommendation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .hero-card {
            background: linear-gradient(135deg, rgba(43,45,51,1) 0%, rgba(28,29,32,1) 100%);
            padding: 20px; border-radius: 4px; border: 1px solid var(--dota-border);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .hero-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--win-green); }

        /* Barra de Impacto Visual */
        .impact-bar-container { width: 100%; background: #111; height: 12px; border-radius: 6px; margin-top: 8px; overflow: hidden; border: 1px solid #333; }
        .impact-bar-fill { height: 100%; background: linear-gradient(90deg, var(--win-green-dark), var(--win-green)); transition: width 1s ease-in-out; }

        /* Timeline de Items */
        .build-phase { margin-top: 15px; border-top: 1px dashed var(--dota-border); padding-top: 10px; }
        .phase-title { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        .items-container { display: flex; flex-wrap: wrap; gap: 8px; }

        .item-card {
            display: flex; flex-direction: column; align-items: center;
            background: #1A1A1A; border: 1px solid var(--dota-border);
            border-radius: 4px; padding: 6px; width: 68px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); position: relative;
        }
        .item-card.early { border-bottom: 2px solid #555; }
        .item-card.core { border-bottom: 2px solid var(--dota-gold); }
        .item-card.situational { border-bottom: 2px solid var(--dota-red-bright); }

        .item-img { width: 55px; height: 40px; object-fit: cover; border-radius: 2px; margin-bottom: 4px; }
        .item-time { font-size: 0.7rem; color: var(--win-green); font-weight: bold; margin-bottom: 2px; text-align: center; line-height: 1; }
        .item-name { font-size: 0.6rem; color: var(--dota-text); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .loader { text-align: center; color: var(--win-green); font-weight: bold; display: none; margin: 20px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

<header>
    <h1>DOTA 2 <span>Tactical</span> Analyzer</h1>
    <p style="color: var(--win-green); margin: 5px 0 0 0; font-size: 0.9rem;">Operational KPIs & Strategy Matrix</p>
</header>

<div class="main-layout">
    <aside class="card">
        <div class="input-group">
            <label>Tu Rol a Jugar</label>
            <select id="playerRole">
                <option value="1">Pos 1 (Hard Carry)</option>
                <option value="2">Pos 2 (Midlaner)</option>
                <option value="3">Pos 3 (Offlaner)</option>
                <option value="4">Pos 4 (Soft Support)</option>
                <option value="5">Pos 5 (Hard Support)</option>
            </select>
        </div>

        <h3>Draft Enemigo</h3>
        <div id="enemySlots">
            <div class="enemy-slot"><img id="img-0" class="slot-img"><select class="hero-sel" id="sel-0" onchange="updateIcon(0)"></select></div>
            <div class="enemy-slot"><img id="img-1" class="slot-img"><select class="hero-sel" id="sel-1" onchange="updateIcon(1)"></select></div>
            <div class="enemy-slot"><img id="img-2" class="slot-img"><select class="hero-sel" id="sel-2" onchange="updateIcon(2)"></select></div>
            <div class="enemy-slot"><img id="img-3" class="slot-img"><select class="hero-sel" id="sel-3" onchange="updateIcon(3)"></select></div>
            <div class="enemy-slot"><img id="img-4" class="slot-img"><select class="hero-sel" id="sel-4" onchange="updateIcon(4)"></select></div>
        </div>
        <button class="btn-analyze" onclick="processDraft()">Analizar Estrategia</button>
    </aside>

    <main class="card">
        <h3>Estrategia Operacional & Counter-Builds</h3>
        <div id="loader" class="loader">Ejecutando algoritmos heurísticos...</div>
        <div id="resultsArea" class="recommendation-grid">
            <p style="color: #888; text-align: center; grid-column: 1/-1; padding: 40px;">Selecciona el equipo enemigo y tu rol para generar la matriz de decisión.</p>
        </div>
    </main>
</div>

<script>
    const API = "https://api.opendota.com/api";
    const HERO_IMG_URL = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/";
    const ITEM_IMG_URL = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/";
    let heroes = [];

    // Lógica Dura de Dota 2
    const mechanics = {
        healers: ["Necrophos", "Huskar", "Alchemist", "Io", "Chen", "Enchantress", "Witch Doctor", "Dazzle", "Lifestealer"],
        evasion: ["Phantom Assassin", "Windranger", "Riki", "Brewmaster", "Tinker", "Butterfly"],
        illusions: ["Phantom Lancer", "Naga Siren", "Chaos Knight", "Terrorblade", "Meepo"],
        tanks: ["Axe", "Centaur Warrunner", "Bristleback", "Tidehunter", "Primal Beast", "Pudge"],
        heavy_magic: ["Zeus", "Skywrath Mage", "Leshrac", "Pugna", "Lina", "Lion"]
    };

    async function init() {
        try {
            const resp = await fetch(`${API}/heroes`);
            heroes = await resp.json();
            heroes.sort((a,b) => a.localized_name.localeCompare(b.localized_name));
            
            document.querySelectorAll('.hero-sel').forEach(sel => {
                sel.innerHTML = `<option value="">-- Seleccionar Héroe --</option>` + 
                    heroes.map(h => `<option value="${h.id}">${h.localized_name}</option>`).join('');
            });
        } catch (e) {
            alert("Error conectando con OpenDota API.");
        }
    }

    function updateIcon(index) {
        const id = document.getElementById(`sel-${index}`).value;
        const hero = heroes.find(h => h.id == id);
        if(hero) {
            const cleanName = hero.name.replace('npc_dota_hero_', '');
            document.getElementById(`img-${index}`).src = `${HERO_IMG_URL}${cleanName.toLowerCase()}.png`;
        } else {
            document.getElementById(`img-${index}`).src = "";
        }
    }

    // Motor Avanzado de Items Dinámicos según Rol y Fase
    function calculateFullBuild(enemyDraftIds, role) {
        const enemyHeroes = enemyDraftIds.map(id => heroes.find(h => h.id == id));
        let build = { early: [], core: [], situational: [] };
        
        let stats = { magicWeight: 0, physicalWeight: 0, needsVessel: false, needsMkb: false, needsAoe: false, needsBreak: false };

        enemyHeroes.forEach(hero => {
            if (!hero) return;
            if (mechanics.heavy_magic.includes(hero.localized_name) || hero.roles.includes("Nuker")) stats.magicWeight++;
            if (hero.primary_attr === "agi" || hero.roles.includes("Carry")) stats.physicalWeight++;
            if (mechanics.healers.includes(hero.localized_name)) stats.needsVessel = true;
            if (mechanics.evasion.includes(hero.localized_name)) stats.needsMkb = true;
            if (mechanics.illusions.includes(hero.localized_name)) stats.needsAoe = true;
            if (mechanics.tanks.includes(hero.localized_name)) stats.needsBreak = true;
        });

        // LÓGICA DE ROLES
        if (role == "1" || role == "2") { // Carries & Mids
            build.early.push(
                { name: 'Magic Wand', key: 'magic_wand', time: '3-5 Min' },
                { name: 'Power Treads', key: 'power_treads', time: '6-8 Min' },
                { name: 'Wraith Band / Bracer', key: 'wraith_band', time: '5 Min' }
            );
            build.core.push(
                { name: 'Black King Bar', key: 'black_king_bar', time: '20-24 Min' },
                { name: 'Blink Dagger / Manta', key: 'manta', time: '18-22 Min' }
            );
            
            // Counters para Core
            if (stats.needsMkb) build.situational.push({ name: 'Monkey King Bar', key: 'monkey_king_bar', time: '30-35 Min' });
            if (stats.needsAoe) build.situational.push({ name: 'Mjölnir / Battlefury', key: 'mjollnir', time: '25-28 Min' });
            if (stats.needsBreak) build.situational.push({ name: 'Silver Edge', key: 'silver_edge', time: '30-35 Min' });
            if (stats.magicWeight >= 2) build.situational.push({ name: 'Mage Slayer', key: 'mage_slayer', time: '15-18 Min' });

        } else if (role == "3") { // Offlaners
            build.early.push(
                { name: 'Bracer', key: 'bracer', time: '3 Min' },
                { name: 'Phase Boots', key: 'phase_boots', time: '7 Min' },
                { name: 'Magic Wand', key: 'magic_wand', time: '4 Min' }
            );
            build.core.push(
                { name: 'Blink Dagger', key: 'blink', time: '12-15 Min' },
                { name: 'Blade Mail', key: 'blade_mail', time: '14-17 Min' }
            );
            
            // Counters para Offlaner
            if (stats.magicWeight >= 2) build.situational.push({ name: 'Pipe of Insight', key: 'pipe', time: '20-25 Min' });
            if (stats.physicalWeight >= 2) build.situational.push({ name: 'Crimson Guard', key: 'crimson_guard', time: '20-25 Min' });
            if (stats.needsVessel) build.situational.push({ name: 'Heaven\'s Halberd', key: 'heavens_halberd', time: '25 Min' });

        } else { // Supports (Pos 4/5)
            build.early.push(
                { name: 'Boots', key: 'boots', time: '5 Min' },
                { name: 'Magic Wand', key: 'magic_wand', time: '6 Min' },
                { name: 'Wind Lace', key: 'wind_lace', time: '8 Min' }
            );
            build.core.push(
                { name: 'Force Staff', key: 'force_staff', time: '18-22 Min' },
                { name: 'Glimmer Cape', key: 'glimmer_cape', time: '22-25 Min' }
            );
            
            // Counters para Support
            if (stats.needsVessel) build.situational.push({ name: 'Spirit Vessel', key: 'spirit_vessel', time: '20-25 Min' });
            if (stats.physicalWeight >= 2) build.situational.push({ name: 'Ghost Scepter', key: 'ghost', time: '25-28 Min' });
            if (stats.magicWeight >= 2) build.situational.push({ name: 'Eul\'s Scepter', key: 'cyclone', time: '25-30 Min' });
            if (stats.needsBreak || stats.needsMkb) build.situational.push({ name: 'Scythe of Vyse', key: 'sheepstick', time: '35+ Min' });
        }

        // Si no se llenaron suficientes situacionales, agregamos genéricos por rol
        if (build.situational.length === 0) {
            if (role <= 2) build.situational.push({ name: 'Eye of Skadi', key: 'skadi', time: '35 Min' });
            if (role == 3) build.situational.push({ name: 'Assault Cuirass', key: 'assault', time: '30 Min' });
            if (role >= 4) build.situational.push({ name: 'Aghanim\'s Scepter', key: 'ultimate_scepter', time: '35 Min' });
        }

        return build;
    }

    async function processDraft() {
        const loader = document.getElementById('loader');
        const resultsArea = document.getElementById('resultsArea');
        const role = document.getElementById('playerRole').value;
        const selectedEnemies = Array.from(document.querySelectorAll('.hero-sel'))
                                     .map(s => s.value)
                                     .filter(v => v !== "");

        if(selectedEnemies.length === 0) return alert("Selecciona enemigos para cruzar datos.");

        loader.style.display = "block";
        resultsArea.innerHTML = "";

        try {
            const matchupPromises = selectedEnemies.map(id => fetch(`${API}/heroes/${id}/matchups`).then(r => r.json()));
            const allMatchups = await Promise.all(matchupPromises);

            let scores = {};
            let maxScore = 0;

            allMatchups.forEach(list => {
                list.forEach(m => {
                    if(!scores[m.hero_id]) scores[m.hero_id] = 0;
                    if(m.games_played > 10) {
                        let winrate = m.wins / m.games_played;
                        scores[m.hero_id] += winrate;
                    }
                });
            });

            // Ordenamos y obtenemos el max score para calcular el porcentaje relativo visual
            let recommendedList = Object.keys(scores)
                .filter(id => !selectedEnemies.includes(id))
                .map(id => {
                    let avgWR = scores[id] / selectedEnemies.length;
                    if (avgWR > maxScore) maxScore = avgWR;
                    return { id: parseInt(id), score: avgWR };
                })
                .sort((a,b) => b.score - a.score)
                .slice(0, 4); 

            // Filtro básico de rol: En un caso real aquí cruzaríamos con la API, pero esto asegura los top estadísticos reales
            const buildMatrix = calculateFullBuild(selectedEnemies, role);
            renderResults(recommendedList, buildMatrix, maxScore);

        } catch (e) {
            resultsArea.innerHTML = `<p style="color:var(--dota-red)">Error analizando Big Data. Valve Rate Limit excedido.</p>`;
        } finally {
            loader.style.display = "none";
        }
    }

    function renderItemHTML(item, phaseClass) {
        return `
            <div class="item-card ${phaseClass}" title="${item.name}">
                <img class="item-img" src="${ITEM_IMG_URL}${item.key}.png" onerror="this.src='https://via.placeholder.com/55x40?text=Item'">
                <span class="item-time">${item.time}</span>
                <span class="item-name">${item.name}</span>
            </div>
        `;
    }

    function renderResults(recommended, buildMatrix, maxScore) {
        const area = document.getElementById('resultsArea');
        
        const earlyHtml = buildMatrix.early.map(i => renderItemHTML(i, 'early')).join('');
        const coreHtml = buildMatrix.core.map(i => renderItemHTML(i, 'core')).join('');
        const sitHtml = buildMatrix.situational.map(i => renderItemHTML(i, 'situational')).join('');

        recommended.forEach(rec => {
            const hInfo = heroes.find(h => h.id === rec.id);
            const cleanName = hInfo.name.replace('npc_dota_hero_', '');
            const wr = (rec.score * 100).toFixed(1);
            
            // Calcular barra visual relativa al mejor counter posible
            const impactPercentage = Math.min((rec.score / maxScore) * 100, 100).toFixed(0);

            area.innerHTML += `
                <div class="hero-card">
                    <div style="display:flex; justify-content: space-between; align-items:flex-start;">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <img src="${HERO_IMG_URL}${cleanName}.png" style="width:85px; border-radius:3px; border:1px solid var(--dota-border); box-shadow: 0 4px 8px rgba(0,0,0,0.5);">
                            <div>
                                <strong style="font-size: 1.2rem; color: #fff;">${hInfo.localized_name}</strong>
                                <div style="color: var(--win-green); font-weight: bold; font-size: 1.1rem; margin-top: 4px;">${wr}% Winrate</div>
                            </div>
                        </div>
                        <div style="text-align:right; min-width: 100px;">
                            <span style="font-size: 0.7rem; color: #888; text-transform:uppercase;">Impacto Estratégico</span>
                            <div class="impact-bar-container">
                                <div class="impact-bar-fill" style="width: ${impactPercentage}%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="build-phase">
                        <div class="phase-title">Early Game (Línea)</div>
                        <div class="items-container">${earlyHtml}</div>
                    </div>

                    <div class="build-phase">
                        <div class="phase-title">Core Items (Pico de Poder)</div>
                        <div class="items-container">${coreHtml}</div>
                    </div>

                    <div class="build-phase" style="border-top-color: rgba(228, 77, 58, 0.4);">
                        <div class="phase-title" style="color: var(--dota-red-bright);">Situacional / Counters</div>
                        <div class="items-container">${sitHtml}</div>
                    </div>
                </div>
            `;
        });
    }

    init();
</script>

</body>
</html>
