<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Strategic Intelligence - Ary Edition</title>
    <style>
        :root {
            --dota-red: #B44335;
            --dota-red-bright: #E44D3A;
            --dota-dark: #1C1D20;
            --dota-panel: #2B2D33;
            --dota-gold: #C0A05F;
            --dota-text: #D4D4D4;
            --dota-border: #42464F;
            --win-green: #73D35B;
            --win-green-dark: #2d5a27;
            --target-blue: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dota-dark);
            background-image: radial-gradient(circle at 50% 0%, #302626 0%, transparent 60%);
            color: var(--dota-text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(to bottom, #111, var(--dota-dark));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--dota-red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
            padding: 25px;
            max-width: 1700px;
            margin: 0 auto;
            flex: 1;
        }

        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }

        .card {
            background: var(--dota-panel);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid var(--dota-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { color: var(--dota-gold); text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 10px; }

        .enemy-slot {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            background: rgba(0,0,0,0.4); padding: 5px; border-radius: 4px;
        }

        .slot-img { width: 60px; height: 34px; border: 1px solid #444; object-fit: cover; background: #000; }

        select {
            width: 100%; padding: 12px; background: #111; color: #fff;
            border: 1px solid var(--dota-border); border-radius: 3px;
        }

        .btn-analyze {
            width: 100%; padding: 18px;
            background: linear-gradient(to bottom, var(--win-green-dark), var(--win-green));
            color: #000; border: none; font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); margin-top: 15px;
        }

        .recommendation-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px;
        }

        .hero-card {
            background: #24262b; border-radius: 4px; border: 1px solid var(--dota-border);
            padding: 20px; border-left: 5px solid var(--win-green);
        }

        .section-title { font-size: 0.75rem; color: var(--dota-gold); text-transform: uppercase; margin: 15px 0 8px; font-weight: bold; }
        
        /* Combo UI */
        .combo-box {
            display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4);
            padding: 8px; border-radius: 4px; border: 1px solid #444; margin-bottom: 10px;
        }
        .key { background: #444; padding: 2px 8px; border-radius: 3px; font-weight: bold; font-size: 0.9rem; border: 1px solid #666; }

        /* Priority Target UI */
        .target-list { background: rgba(180, 67, 53, 0.1); border-left: 3px solid var(--dota-red); padding: 10px; margin-top: 10px; }
        .target-item { font-size: 0.85rem; color: #ffadad; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }

        /* Win Tips */
        .tip-box { font-size: 0.85rem; color: var(--win-green); font-style: italic; background: rgba(115, 211, 91, 0.05); padding: 8px; border-radius: 4px; }

        footer {
            padding: 20px; text-align: center; background: #111; border-top: 1px solid #222;
            color: #555; font-weight: bold; font-size: 0.9rem;
        }
        .signature { color: var(--dota-gold); text-shadow: 0 0 5px rgba(192, 160, 95, 0.3); }

        .item-box { background: #111; border: 1px solid #333; padding: 4px; width: 60px; text-align: center; border-radius: 3px; }
        .item-box img { width: 45px; height: 33px; }
        .item-box span { font-size: 0.6rem; display: block; color: var(--win-green); }

        .loader { text-align: center; color: var(--win-green); display: none; padding: 40px; }
    </style>
</head>
<body>

<header>
    <h1>DOTA 2 <span>ARY</span> ANALYZER</h1>
    <p style="color: var(--dota-gold); font-size: 0.8rem; letter-spacing: 2px;">STRATEGIC KILL ORDER & BUILD MATRIX</p>
</header>

<div class="main-layout">
    <aside class="card">
        <div style="margin-bottom:20px">
            <label style="font-size:0.7rem; color:var(--dota-gold); text-transform:uppercase">Tu Posición</label>
            <select id="roleSel">
                <option value="core">Core (Pos 1/2/3)</option>
                <option value="support">Support (Pos 4/5)</option>
            </select>
        </div>
        <h3>Draft Enemigo</h3>
        <div id="enemySlots">
            <div class="enemy-slot"><img id="img-0" class="slot-img"><select class="hero-sel" id="sel-0" onchange="updateIcon(0)"></select></div>
            <div class="enemy-slot"><img id="img-1" class="slot-img"><select class="hero-sel" id="sel-1" onchange="updateIcon(1)"></select></div>
            <div class="enemy-slot"><img id="img-2" class="slot-img"><select class="hero-sel" id="sel-2" onchange="updateIcon(2)"></select></div>
            <div class="enemy-slot"><img id="img-3" class="slot-img"><select class="hero-sel" id="sel-3" onchange="updateIcon(3)"></select></div>
            <div class="enemy-slot"><img id="img-4" class="slot-img"><select class="hero-sel" id="sel-4" onchange="updateIcon(4)"></select></div>
        </div>
        <button class="btn-analyze" onclick="processAnalysis()">Generar Estrategia</button>
    </aside>

    <main class="card">
        <div id="loader" class="loader">Analizando prioridades de combate...</div>
        <div id="resultsArea" class="recommendation-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 50px; color: #555;">Ingresa el draft enemigo para ver la prioridad de ataque.</div>
        </div>
    </main>
</div>

<footer>
    Creado by <span class="signature">"Ary :3"</span>
</footer>

<script>
    const API = "https://api.opendota.com/api";
    const IMG = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/";
    const ITEM_IMG = "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/";
    let heroes = [];

    // Base de datos de Combos Reales (Solo si son específicos)
    const realCombos = {
        "Axe": ["Blink", "R", "W"],
        "Legion Commander": ["W", "Blink", "R"],
        "Tinker": ["Q", "W", "R", "Q"],
        "Earthshaker": ["Blink", "R", "Q", "E"],
        "Invoker": ["W", "W", "W", "R", "Q", "Q", "Q", "R"],
        "Storm Spirit": ["R", "Atk", "W", "Atk", "Q", "Atk"]
    };

    async function init() {
        const r = await fetch(`${API}/heroes`);
        heroes = await r.json();
        heroes.sort((a,b) => a.localized_name.localeCompare(b.localized_name));
        document.querySelectorAll('.hero-sel').forEach(s => {
            s.innerHTML = `<option value="">-</option>` + heroes.map(h => `<option value="${h.id}">${h.localized_name}</option>`).join('');
        });
    }

    function updateIcon(i) {
        const id = document.getElementById(`sel-${i}`).value;
        const h = heroes.find(x => x.id == id);
        document.getElementById(`img-${i}`).src = h ? `${IMG}${h.name.replace('npc_dota_hero_', '')}.png` : "";
    }

    async function processAnalysis() {
        const area = document.getElementById('resultsArea');
        const role = document.getElementById('roleSel').value;
        const enemiesIds = Array.from(document.querySelectorAll('.hero-sel')).map(s => s.value).filter(v => v);

        if(!enemiesIds.length) return alert("Selecciona enemigos.");
        document.getElementById('loader').style.display = "block";
        area.innerHTML = "";

        try {
            const matchupPromises = enemiesIds.map(id => fetch(`${API}/heroes/${id}/matchups`).then(r => r.json()));
            const allMatchups = await Promise.all(matchupPromises);

            let scores = {};
            allMatchups.forEach(list => {
                list.forEach(m => {
                    if(!scores[m.hero_id]) scores[m.hero_id] = 0;
                    if(m.games_played > 10) scores[m.hero_id] += (m.wins/m.games_played);
                });
            });

            const top = Object.keys(scores)
                .filter(id => !enemiesIds.includes(id))
                .map(id => ({ id: parseInt(id), wr: scores[id]/enemiesIds.length }))
                .sort((a,b) => b.wr - a.wr).slice(0, 4);

            // Determinar Prioridad de Ataque (Heurística)
            const enemyHeroes = enemiesIds.map(id => heroes.find(h => h.id == id));
            const killOrder = enemyHeroes.sort((a, b) => {
                const prio = h => (h.roles.includes("Support") ? 3 : 0) + (h.roles.includes("Nuker") ? 2 : 0) - (h.roles.includes("Durable") ? 4 : 0);
                return prio(b) - prio(a);
            }).slice(0, 2);

            top.forEach(rec => {
                const h = heroes.find(x => x.id === rec.id);
                const combo = realCombos[h.localized_name];
                const cleanName = h.name.replace('npc_dota_hero_', '');
                
                area.innerHTML += `
                    <div class="hero-card">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div style="display:flex; gap:10px; align-items:center">
                                <img src="${IMG}${cleanName}.png" style="width:70px">
                                <strong>${h.localized_name}</strong>
                            </div>
                            <span style="color:var(--win-green); font-weight:bold">${(rec.wr*100).toFixed(1)}% WR</span>
                        </div>

                        ${combo ? `
                            <div class="section-title">Protocolo de Burst</div>
                            <div class="combo-box">${combo.map(k => `<span class="key">${k}</span>`).join(' ➔ ')}</div>
                        ` : ''}

                        <div class="section-title">Prioridad de Ataque en Teamfight</div>
                        <div class="target-list">
                            ${killOrder.map(e => `
                                <div class="target-item">
                                    <span style="color:var(--dota-red)">[!]</span> Eliminar a <strong>${e.localized_name}</strong> primero.
                                </div>
                            `).join('')}
                        </div>

                        <div class="section-title">Consejo de Victoria</div>
                        <div class="tip-box">
                            ${role === 'core' ? 'No inicies si no ves a los supports enemigos. Espera su error.' : 'Guarda tu stun para cancelar el BKB o TP enemigo.'}
                        </div>
                    </div>
                `;
            });

        } catch(e) { console.error(e); }
        document.getElementById('loader').style.display = "none";
    }

    init();
</script>
</body>
</html>
